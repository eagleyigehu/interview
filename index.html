<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Froglife 面试速查</title>
<style>
  :root{
    --ink:#20261F; --paper:#F7F6F1; --card:#FFFFFF;
    --moss:#2E6B3E; --moss-deep:#1E4230;
    --amber:#A36400; --grey:#6E6E68; --line:#E3E1D8;
    --p1:#2E6B3E; --p2:#0E6B72; --p3:#6B3E8F;
    --trackerH:48px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,"PingFang SC","Helvetica Neue","Noto Sans SC",sans-serif}
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

  #tracker{position:fixed;top:0;left:0;right:0;z-index:20;height:var(--trackerH);
    display:flex;gap:6px;align-items:stretch;padding:7px 10px;background:var(--moss-deep)}
  #tracker button{flex:1;border-radius:8px;font-size:12.5px;font-weight:600;
    color:#fff;background:rgba(255,255,255,.14);line-height:1.2}
  #tracker button.done{background:#4C9A5E;text-decoration:line-through;opacity:.85}
  #tracker #langbtn{flex:0 0 52px;background:#fff;color:var(--moss-deep);font-weight:800;font-size:14px}
  #spacer{height:var(--trackerH)}

  #home{padding:14px 14px 40px;max-width:640px;margin:0 auto}
  #home h1{font-size:20px;font-weight:800;color:var(--moss-deep);margin:6px 2px 2px}
  #home .sub{font-size:12.5px;color:var(--grey);margin:0 2px 10px}
  .part{font-size:13px;font-weight:700;color:var(--moss);margin:16px 2px 8px;letter-spacing:.04em}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 10px;text-align:left;font-size:15px;font-weight:650;line-height:1.3;
    box-shadow:0 1px 2px rgba(32,38,31,.05)}
  .chip:active{background:#EDF3EE}
  .chip .n{color:var(--moss);font-weight:800;margin-right:5px}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:5px;vertical-align:1px}
  .chip.wide{grid-column:1 / -1}
  .d1{background:var(--p1)} .d2{background:var(--p2)} .d3{background:var(--p3)}

  .ans{display:none;max-width:640px;margin:0 auto;padding-bottom:96px}
  .ans.show{display:block}
  #home.hide{display:none}
  .topbar{position:sticky;top:var(--trackerH);z-index:15;width:100%;text-align:left;
    background:var(--moss-deep);color:#fff;padding:13px 14px 14px;
    font-size:16px;font-weight:750;line-height:1.3;display:block}
  .topbar .back{opacity:.9;font-weight:600;font-size:13.5px;display:block;margin-bottom:3px}
  .body{padding:12px 16px}
  .note{font-size:13px;color:var(--grey);font-style:italic;margin:4px 0 10px}
  .label{font-size:13px;font-weight:800;margin:16px 0 6px;padding:4px 8px;border-radius:6px;display:inline-block}
  .say .label{color:#fff;background:var(--moss)}
  .hook .label{color:#fff;background:var(--amber)}
  .backup .label{color:#fff;background:var(--grey)}
  .lines{border-left:3px solid var(--line);padding-left:12px}
  .say .lines{border-color:var(--moss)}
  .hook .lines{border-color:var(--amber)}
  .backup .lines{border-color:#C7C5BC;color:#3C4039}
  .lines p{font-size:18px;line-height:1.5;margin:0}
  .lines p.gap{height:14px}

  /* 语言模式 */
  body.m-en .lines p.zh{display:none}
  body.m-zh .lines p.en{display:none}
  body.m-both .lines p.zh{font-size:13.5px;color:#8B8B82;line-height:1.4;margin:0 0 7px}

  .navrow{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;gap:1px;
    background:var(--line);border-top:1px solid var(--line)}
  .navrow button{flex:1;padding:15px 4px;background:var(--card);font-size:15px;font-weight:700;color:var(--moss-deep)}
  .navrow button.homebtn{flex:1.2;background:var(--moss);color:#fff;font-size:16px}
  .navrow button:active{opacity:.8}
  .navrow button:disabled{color:#BBB}

  @media (min-width:520px){ .grid{grid-template-columns:1fr 1fr 1fr} }
</style>
</head>
<body class="m-en">

<div id="tracker">
  <button data-tog="0" id="t0">① 科学+艺术</button>
  <button data-tog="1" id="t1">② 陶瓷+声音</button>
  <button data-tog="2" id="t2">③ 双语触达</button>
  <button id="langbtn" data-lang="1">EN</button>
</div>
<div id="spacer"></div>

<div id="home"></div>
<div id="ansWrap"></div>

 {id:"7b", key:"冬季时间线+应急(新)", pts:[], note:"预判题:合同2026年9月–2027年2月,6个月完成12场工作坊、共创、对接制作方、安装两件雕塑。林肯郡秋冬严酷:低温大雨影响户外出席,也影响混凝土养护和地基开挖。问:时间线怎么排?天气打乱了怎么办?", blocks:[
  ["say","说的一半(一定说)",[
   ["My starting point: plan backwards from the weather.","我的出发点:倒着从天气排计划。"],
   ["Anything that needs the ground —","所有要动土的环节——"],
   ["the excavation, the foundations, the hibernaculum —","开挖、地基、越冬巢——"],
   ["happens early, in autumn,","都放在早期、秋天做,"],
   ["while conditions still allow.","趁条件还允许。"],
   "",
   ["The workshops are ceramics-based,","工作坊以陶瓷为主,"],
   ["so they're indoor by nature.","本质上就是室内活动。"],
   ["I'd book warm community venues in advance —","我会提前订好温暖的社区场地——"],
   ["halls, libraries, schools —","礼堂、图书馆、学校——"],
   ["so winter weather can't cancel them.","这样冬天的天气取消不了它们。"],
   "",
   ["Fabrication happens off-site, over winter,","制作在场外进行,贯穿冬季,"],
   ["indoors, unaffected by the weather.","在室内,不受天气影响。"],
   ["Then the final install is short —","最后的安装时间很短——"],
   ["mostly assembly, in a weather window,","主要是组装,挑一个天气窗口,"],
   ["with buffer time built in.","并预留缓冲时间。"]]],
  ["backup","后手:三个具体应急",[
   ["Three specific back-ups.","三个具体的后备方案。"],
   ["Every outdoor session has an indoor twin —","每场户外活动都有室内替代版——"],
   ["same date, same content, moved inside.","同一天、同样内容,搬到室内。"],
   "",
   ["All concrete and groundwork is done by late autumn,","混凝土和土建在深秋前全部完成,"],
   ["so nothing structural depends on January.","结构环节完全不押在一月份。"],
   "",
   ["And the schedule keeps two spare weeks free —","日程里留出两周机动——"],
   ["so one bad month doesn't break the plan.","一个糟糕的月份不至于打乱全局。"],
   ["If the install slips, the sculpture is finished and stored —","如果安装延误,雕塑已完工入库——"],
   ["only the final fixing waits for the window.","只有最后的固定等天气窗口。"]]]
 ]},
 {id:"8", key:"两爬热情", pts:[1], blocks:[
  ["say","说的一半(一定说)",[
   ["This is something I've ended up","这其实是我后来"],
   ["caring about quite a lot.","非常在意的一件事。"],
   "",
   ["On my own initiative,","我主动做了"],
   ["I built a public frog-distribution map,","一个公开的蛙类分布地图,"],
   ["for the frogs living in the city.","记录生活在城市里的青蛙。"],
   ["Nobody asked me to.","没有人要求我做。"],
   ["I just wanted that data to reach people","我只是想让这些数据触达"],
   ["who'd never normally go looking for it.","那些平时根本不会去找它的人。"],
   ["And honestly, even I was surprised —","而且说实话,连我自己都很惊讶——"],
   ["by how close frogs live to our everyday lives.","青蛙离我们的日常生活这么近。"],
   "",
   ["My connection to amphibians is quite practical —","我和两栖动物的联系很实在——"],
   ["it comes from the fieldwork I've done.","来自我做过的野外工作。"],
   ["There's one night survey","有一次夜间调查"],
   ["that really captures why it matters to me.","特别能说明它为什么对我重要。"],
   ["Happy to tell you about it.","愿意的话我可以讲讲。"]]],
  ["backup","后手:夜里找蛙的故事(最有画面感)",[
   ["One night, a friend and I","有一天晚上,我和朋友"],
   ["followed frog calls along the wetland edge.","沿着湿地边缘循着蛙鸣找。"],
   ["It took nearly two hours","花了将近两个小时"],
   ["to find the first frog —","才找到第一只蛙——"],
   ["with just a weak torch.","手里只有一支很弱的手电。"],
   "",
   ["I can barely picture it now.","它长什么样我现在几乎想不起来了。"],
   ["But I still remember the sound, exactly.","但那个声音我记得一清二楚。"],
   ["Something so small","那么小的一个生命,"],
   ["pulled two people out into the dark.","把两个人拽进了黑夜里。"],
   "",
   ["That feeling is what I'd want the sculptures","我希望这两件雕塑带给人们的,"],
   ["to give people —","就是这种感觉——"],
   ["about their own local wildlife.","对他们身边野生动物的感觉。"]]]
 ]},
 {id:"8b", key:"扭转两爬印象(新)", pts:[1], note:"预判题:青蛙蟾蜍不像毛茸茸的动物那样讨喜,有人觉得\u201c黏糊糊\u201d或根本注意不到。你打算怎么用插画背景扭转波士顿公众的看法?怎么让居民尤其是孩子对蟾蜍产生好奇和联结?", blocks:[
  ["say","说的一半(一定说)",[
   ["Honestly — I think \u201cslimy\u201d is a looking problem.","说实话——\u201c黏糊糊\u201d其实是\u201c没好好看过\u201d的问题。"],
   ["People find frogs unappealing","人们觉得青蛙不讨喜,"],
   ["because they've never really looked at one.","是因为从没认真看过一只。"],
   ["Illustration is exactly the tool for that.","插画正是解决这个的工具。"],
   ["It slows people down, and makes them look.","它让人慢下来,真正去看。"],
   "",
   ["With kids, I wouldn't start with \u201cprotect amphibians\u201d.","对孩子,我不会从\u201c保护两栖动物\u201d讲起。"],
   ["I'd start with drawing one —","我会从画一只开始——"],
   ["the gold ring in a toad's eye,","蟾蜍眼睛里那圈金色,"],
   ["the way a frog's throat moves when it calls.","青蛙鸣叫时喉咙的起伏。"],
   ["Once you've drawn something,","一旦你画过一样东西,"],
   ["you can't find it ugly anymore.","你就没法再觉得它丑了。"],
   ["You notice it. You start to care.","你会注意到它,开始在意它。"],
   "",
   ["And the ocarinas help too —","陶笛也在帮忙——"],
   ["a frog you made, that sings in your hand,","一只你亲手做的、在掌心歌唱的青蛙,"],
   ["is very hard to call slimy.","很难再被叫作\u201c黏糊糊\u201d。"]]],
  ["backup","后手:波士顿的具体做法",[
   ["Concretely, in Boston:","具体到波士顿:"],
   ["illustrated species cards of the local pond life —","本地池塘物种的插画卡片——"],
   ["characterful, accurate, and bilingual.","有性格、够准确、双语。"],
   ["A drawing moment inside every workshop.","每场工作坊里都有一个画画环节。"],
   ["And the sculptures themselves as friendly characters —","雕塑本身也是亲切的角色——"],
   ["designed with the community,","和社区一起设计,"],
   ["so they feel like neighbours, not monuments.","让它们像邻居,而不是纪念碑。"]]]
 ]},

 {id:"9", key:"雕塑概念", pts:[2], note:"先讲整体概念→再讲工作坊→最后讲雕塑亮点", blocks:[

   ["One thing that's really important to me","还有一点对我来说特别重要，"],

 {id:"9b", key:"声音景观:采集+编织(新)", pts:[2], note:"预判题:QR声音景观混合蛙鸣和多语言口述历史,音频有力但难做好。问:12场工作坊里怎么实际采集录音?怎么让普通居民放松开口?创作和技术上,怎么把人声和自然声编织成有叙事感的整体,而不是素材堆砌?", blocks:[

   "",

   ["rather than sitting people in front of a mic.","而不是让人正襟危坐地对着麦克风。"],
   "",
   ["And for people less confident in English —","对英语不太自信的人——"],

  ["backup","后手:声音怎么编织",[

 {id:"9c", key:"互动 vs 栖息地(新)", pts:[], note:"预判题:公共艺术点位人来人往还有狗,但蟾蜍越冬巢9月–2月需要安静、黑暗、潮湿、不被打扰。问:扫码触摸的互动性和栖息地的安静要求怎么平衡?怎么防干扰 and 破坏,同时向公众科普它们的存在?", blocks:[
  ["say","说的一半(一定说)",[
   ["The key is zoning — vertical zoning, really.","关键在分区——其实是垂直分区。"],
   ["Everything interactive lives up top:","所有互动都在上面:"],

   ["the parts you're meant to touch.","设计给人触摸的部分。"],
   "",
   ["The hibernaculum sits down in the base —","越冬巢在底座深处——"],
   ["sealed from human access,","人碰不到,"],
   ["opening away from the path,","入口背向步道,"],
   ["into planting, on the quiet side.","朝向种植带、安静的一侧。"],
   "",
   ["So people interact with the sculpture —","所以人们互动的是雕塑——"],
   ["never with the habitat.","永远不是栖息地本身。"],
   ["The toads get dark, damp, and undisturbed.","蟾蜍得到黑暗、潮湿、不被打扰。"],

  ["backup","后手:细节+灵活备份",[
   ["Details I'd work through with your ecologists:","我会和你们的生态团队敲定的细节:"],
   ["entrances angled away from footfall,","入口偏离人流方向,"],
   ["screened by planting;","用种植遮挡;"],
   ["no openings people can poke things into;","没有任何能让人塞东西的开口;"],
   ["a solid, vandal-proof casing round the chamber.","巢室外围是坚固防破坏的壳体。"],
   "",
   ["And the QR content does the educating —","科普交给二维码内容——"],
   ["\u201cthere are toads sleeping under here\u201d —","\u201c这下面有蟾蜍在冬眠\u201d——"],

   ["not by lifting or prodding.","而不是靠翻动或戳探。"],

 {id:"9d", key:"共创方向跑偏(新)", pts:[], note:"预判题:如果12场工作坊里社区把创作方向带到完全意外的地方——想做完全不同的动物,或提出和\u2018Voices of the Water\u2019不搭的视觉风格,怎么办?怎么既守住Froglife的生物和安全要求,又真心尊重社区创意、不把自己的想法强加给他们?", blocks:[
  ["say","说的一半(一定说)",[
   ["I'd actually welcome that —","说实话,我会欢迎这种情况——"],
   ["it means people feel real ownership.","它说明大家有了真正的主人感。"],
   "",
   ["My way of handling it is to be honest about the frame,","我的处理方式是从第一场工作坊开始,"],
   ["right from workshop one.","就把框架讲清楚。"],
   ["Some things are fixed, and I'd say so openly:","有些东西是定死的,我会坦白说:"],
   ["it's an amphibian commission,","这是一个两栖动物主题的委托,"],
   ["it has to be safe, and durable,","它必须安全、耐久,"],
   ["and there's a real habitat in the base.","底座里有一个真实的栖息地。"],
   ["That's the brief we're all working inside.","这就是我们所有人共同的任务书。"],
   "",
   ["But inside that frame — everything can move.","但框架之内——一切都可以变。"],
   ["The species, the pose, the style, the colours,","物种、姿态、风格、颜色、"],
   ["the stories in the soundscape —","声音景观里的故事——"],
   ["that's genuinely theirs to shape.","这些真正由他们来塑造。"],
   "",
   ["In my experience, people don't resent a clear frame.","以我的经验,大家不反感清晰的框架。"],
   ["They resent a hidden one.","他们反感的是被隐藏的框架。"]]],
  ["backup","后手:怎么引导而不强加",[
   ["Practically, my role is translation — not veto.","实际操作上,我的角色是翻译,不是否决。"],
   ["If someone proposes something outside the frame,","如果有人提出框架之外的想法,"],
   ["I ask what they love about it —","我会先问他们喜欢它哪一点——"],
   ["because the reason usually holds the good idea.","因为好点子往往藏在理由里。"],
   ["A child who wants a dragon","一个想做龙的孩子,"],
   ["usually wants scales, drama, and wings —","想要的通常是鳞片、气势和翅膀——"],
   ["a great crested newt can carry two of those.","冠欧螈就能满足其中两样。"],
   "",
   ["And I keep decisions visible:","而且我让决策过程可见:"],
   ["ideas go on the wall, grouped, voted on —","想法上墙、分组、投票——"],
   ["so the final form is traceable to the group,","让最终形态能追溯到集体,"],
   ["not to my private taste.","而不是我的个人口味。"],
   ["That's how you guide without forcing:","这就是引导而不强加的方法:"],
   ["clear boundaries, open process, shared decisions.","清晰的边界、公开的过程、共同的决定。"]]]
 ]},
 {id:"9e", key:"工作坊记录(新)", pts:[], note:"预判题:12场工作坊怎么边做边记录?怎么捕捉参与者的故事、创作进展和突破时刻,让我们有丰富的素材展示给资方?", blocks:[
  ["say","说的一半(一定说)",[

   ["not bolt it on afterwards.","而不是事后补拍。"],
   ["I ran all the documentation for my own exhibition,","我的个展记录全程是我自己做的,"],

const qs = DATA.filter(d=>d.id);

let grid = false;
for(const d of DATA){
  if(d.part){ if(grid){h+='</div>';grid=false;} h+='<div class="part">'+d.part+'</div><div class="grid">'; grid=true; continue; }
  const dots = (d.pts||[]).map(p=>'<span class="dot d'+p+'"></span>').join('');

  h+='<button class="chip'+wide+'" data-open="'+d.id+'"><span class="n">'+d.id+'</span>'+d.key+dots+'</button>';
}

home.innerHTML=h;

  a+='<div class="ans" id="q'+d.id+'">';

  if(d.note)a+='<p class="note">'+d.note+'</p>';
  for(const [type,label,lines] of d.blocks){
    a+='<div class="'+type+'"><span class="label">'+label+'</span><div class="lines">';
    for(const l of lines){
      if(l==='') a+='<p class="gap"></p>';
      else a+='<p class="en">'+l[0]+'</p><p class="zh">'+l[1]+'</p>';
    }
    a+='</div></div>';
  }
  a+='</div><div class="navrow">';
  a+= i===0 ? '<button disabled>\u2039 上一题</button>' : '<button data-open="'+qs[i-1].id+'">\u2039 '+qs[i-1].id+'</button>';
  a+='<button class="homebtn" data-back="1">全部题目</button>';
  a+= i===qs.length-1 ? '<button disabled>下一题 \u203a</button>' : '<button data-open="'+qs[i+1].id+'">'+qs[i+1].id+' \u203a</button>';
  a+='</div></div>';
});
ansWrap.innerHTML=a;

// ===== 交互 =====
let scrollPos=0, current=null;
const MODES=[['m-en','EN'],['m-zh','中'],['m-both','双']];
let mode=0;

function show(id){
  if(current) document.getElementById('q'+current).classList.remove('show');
  if(id){
    if(!current) scrollPos = window.scrollY || document.documentElement.scrollTop;
    home.classList.add('hide');
    document.getElementById('q'+id).classList.add('show');
    window.scrollTo(0,0);
  } else {
    home.classList.remove('hide');
    window.scrollTo(0,scrollPos);
  }
  current = id;
}

document.addEventListener('click', function(e){
  const t = e.target.closest('[data-open],[data-back],[data-tog],[data-lang]');
  if(!t) return;
  if(t.dataset.lang){
    mode=(mode+1)%3;
    document.body.className=MODES[mode][0];
    t.textContent=MODES[mode][1];
    return;
  }
  if(t.dataset.tog !== undefined){ t.classList.toggle('done'); return; }
  if(t.dataset.open){
    try{ location.hash = 'q-'+t.dataset.open; }catch(_){ }
    show(t.dataset.open);
  } else {
    try{ if(location.hash){ history.back(); return; } }catch(_){ }
    show(null);
  }
});

window.addEventListener('hashchange', function(){
  const m = location.hash.match(/^#q-(.+)$/);
  const id = m ? m[1] : null;
  if(id && document.getElementById('q'+id)) show(id);
  else show(null);
});
</script>
